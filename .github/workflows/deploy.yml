name: TV Display CI/CD

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  IMAGE_NAME: tv-display

jobs:
  # ════════════════════════════════════════════════════════════════
  # BUILD & PUSH DOCKER IMAGE
  # ════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.lower.outputs.owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.env.outputs.environment }}-latest
            type=raw,value=${{ steps.env.outputs.environment }}-${{ github.sha }}
            type=raw,value=${{ steps.env.outputs.environment }}-{{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=/api
            VITE_WS_URL=/ws-game
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════════
  # DEPLOY TO VPS
  # ════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ needs.build-and-push.outputs.environment }}

    steps:
      - name: Checkout code (for compose files)
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set deployment variables
        id: vars
        run: |
          ENV="${{ needs.build-and-push.outputs.environment }}"
          echo "env=${ENV}" >> $GITHUB_OUTPUT
          if [[ "${ENV}" == "prod" ]]; then
            echo "compose_file=docker-compose.prod.yml" >> $GITHUB_OUTPUT
            echo "port=3001" >> $GITHUB_OUTPUT
            echo "backend_port=8081" >> $GITHUB_OUTPUT
          else
            echo "compose_file=docker-compose.dev.yml" >> $GITHUB_OUTPUT
            echo "port=3000" >> $GITHUB_OUTPUT
            echo "backend_port=8080" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "═══════════════════════════════════════"
            echo " Deploying TV Display (${{ steps.vars.outputs.env }})"
            echo "═══════════════════════════════════════"

            # Ensure deploy directory exists
            DEPLOY_DIR="/opt/challenger/tv-display"
            mkdir -p ${DEPLOY_DIR}

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            echo "📦 Pulling image..."
            docker pull ghcr.io/${{ steps.lower.outputs.owner }}/tv-display:${{ steps.vars.outputs.env }}-latest

            # Create/update docker-compose file on server
            cat > ${DEPLOY_DIR}/docker-compose.${{ steps.vars.outputs.env }}.yml << 'SERVERCOMPOSE'
            version: '3.8'

            services:
              tv-display-${{ steps.vars.outputs.env }}:
                image: ghcr.io/${{ steps.lower.outputs.owner }}/tv-display:${{ steps.vars.outputs.env }}-latest
                container_name: tv_display_${{ steps.vars.outputs.env }}
                restart: unless-stopped
                ports:
                  - "${{ steps.vars.outputs.port }}:80"
                environment:
                  BACKEND_URL: "host.docker.internal:${{ steps.vars.outputs.backend_port }}"
                networks:
                  - challenger_network
                labels:
                  app: "tv-display"
                  environment: "${{ steps.vars.outputs.env }}"
                  managed_by: "github-actions"
                deploy:
                  resources:
                    limits:
                      cpus: "0.15"
                      memory: 64M
                extra_hosts:
                  - "host.docker.internal:host-gateway"

            networks:
              challenger_network:
                external: true
            SERVERCOMPOSE

            # Deploy with docker-compose
            echo "🚀 Starting container..."
            cd ${DEPLOY_DIR}
            docker compose -f docker-compose.${{ steps.vars.outputs.env }}.yml up -d --force-recreate

            # Wait for health check
            echo "🏥 Waiting for health check..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:${{ steps.vars.outputs.port }}/health > /dev/null 2>&1; then
                echo "✅ TV Display (${{ steps.vars.outputs.env }}) is healthy on port ${{ steps.vars.outputs.port }}!"
                break
              fi
              if [ $i -eq 15 ]; then
                echo "❌ Health check failed after 15 attempts"
                docker logs tv_display_${{ steps.vars.outputs.env }} --tail 50
                exit 1
              fi
              echo "  Attempt $i/15 — waiting..."
              sleep 2
            done

            # Prune old images (keep disk clean on small VPS)
            echo "🧹 Pruning old images..."
            docker image prune -f --filter "label=app=tv-display" 2>/dev/null || true

            echo ""
            echo "═══════════════════════════════════════"
            echo " ✅ Deployment Complete!"
            echo " URL: http://155.212.244.150:${{ steps.vars.outputs.port }}"
            echo "═══════════════════════════════════════"

      - name: Deployment Summary
        if: always()
        run: |
          ENV="${{ steps.vars.outputs.env }}"
          PORT="${{ steps.vars.outputs.port }}"
          echo "### TV Display Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${ENV} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | http://155.212.244.150:${PORT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ghcr.io/${{ steps.lower.outputs.owner }}/tv-display:${ENV}-latest |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
